# Render Infrastructure as Code
# Deploy: connect your GitHub repo at dashboard.render.com → New → Blueprint

services:
  - type: web
    name: autoapply-ai-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: autoapply-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: autoapply-redis
          type: redis
          property: connectionString
      - key: FERNET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      # Set these manually in the Render dashboard:
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_FRONTEND_API_URL
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_VAULT_OWNER
        sync: false
      - key: GITHUB_VAULT_REPO
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: EXTENSION_ID
        sync: false

  - type: redis
    name: autoapply-redis
    plan: free
    region: oregon
    ipAllowList: []

databases:
  - name: autoapply-db
    databaseName: autoapply_prod
    user: autoapply
    plan: free
    region: oregon
