name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: lint + typecheck + tests ─────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: autoapply_test
          POSTGRES_USER: autoapply
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql+asyncpg://autoapply:testpassword@localhost:5433/autoapply_test"
      REDIS_URL: "redis://localhost:6379"
      ENVIRONMENT: "test"
      FERNET_KEY: "x_fMBr_lJSHIVPOtMtFxnq5RZ34kEFiL-7UEiM-JKYA="
      JWT_SECRET: "ci-test-secret-not-real"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install poetry==1.8.4

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-py${{ matrix.python-version }}-

      - name: Install dependencies
        working-directory: backend
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction

      - name: Ruff lint
        working-directory: backend
        run: poetry run ruff check app/ tests/

      - name: Black format check
        working-directory: backend
        run: poetry run black --check app/ tests/

      - name: mypy type check
        working-directory: backend
        run: poetry run mypy app/

      - name: Run migrations (test DB)
        working-directory: backend
        run: poetry run alembic upgrade head

      - name: Run tests
        working-directory: backend
        run: poetry run pytest tests/ -v --tb=short --cov=app --cov-report=xml

      - name: Upload coverage
        if: github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend

  # ── Extension: typecheck + build ──────────────────────────────────────────
  extension:
    name: Extension (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: TypeScript type check
        working-directory: extension
        run: npx tsc --noEmit

      - name: Build extension
        working-directory: extension
        run: npm run build

      - name: Upload extension artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: extension/dist/
          retention-days: 30

  # ── Docker build check ────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: autoapply-ai:${{ github.sha }}
